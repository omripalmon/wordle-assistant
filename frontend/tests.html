<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordle Helper — Regression Tests</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: #121213;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 2rem; }
    h1 { font-size: 1.9rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 0.3rem; }
    .subtitle { color: #818384; font-size: 0.85rem; }
    .back-link { display: inline-block; margin-top: 0.5rem; font-size: 0.78rem; color: #818384; text-decoration: none; }
    .back-link:hover { color: #fff; }

    /* ── Suite tabs ── */
    .suite-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .tab {
      background: #1a1a1b;
      border: 1px solid #3a3a3c;
      border-radius: 8px;
      color: #818384;
      cursor: pointer;
      font-size: 0.83rem;
      padding: 0.45rem 1rem;
      transition: all 0.15s;
    }
    .tab:hover { border-color: #538d4e; color: #fff; }
    .tab.active { background: #538d4e; border-color: #538d4e; color: #fff; font-weight: 600; }
    .tab .warn { color: #b59f3b; font-size: 0.72rem; margin-left: 0.3rem; }
    .tab.active .warn { color: #ffe08a; }

    /* ── Run button ── */
    #run-btn {
      background: #538d4e;
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 0.7rem 2.2rem;
      transition: background 0.15s, opacity 0.15s;
    }
    #run-btn:hover:not(:disabled) { background: #6aad65; }
    #run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Timer / status ── */
    #status-bar {
      margin-top: 1.2rem;
      font-size: 0.85rem;
      color: #818384;
      min-height: 1.2rem;
      text-align: center;
    }
    #timer { font-variant-numeric: tabular-nums; }

    /* ── Spinner ── */
    .spinner-ring {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #3a3a3c;
      border-top-color: #538d4e;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Summary badges ── */
    #summary {
      display: none;
      gap: 0.6rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .badge {
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.4rem 0.9rem;
      letter-spacing: 0.04em;
    }
    .badge-passed  { background: rgba(83,141,78,0.2);  color: #6aad65; border: 1px solid #538d4e; }
    .badge-failed  { background: rgba(185,28,28,0.2);  color: #f87171; border: 1px solid #7f1d1d; }
    .badge-xfailed { background: rgba(181,159,59,0.2); color: #d4b14a; border: 1px solid #b59f3b; }
    .badge-skipped { background: rgba(58,58,60,0.4);   color: #818384; border: 1px solid #3a3a3c; }
    .badge-time    { background: transparent; color: #818384; border: 1px solid #3a3a3c; }

    /* ── Results table ── */
    #results-wrap {
      display: none;
      width: min(780px, 100%);
      margin-top: 1.8rem;
    }
    .file-group { margin-bottom: 1.8rem; }
    .file-header {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #818384;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid #2a2a2c;
      margin-bottom: 0.2rem;
    }
    .test-row {
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
      padding: 0.38rem 0.2rem;
      border-bottom: 1px solid #1e1e1f;
      font-size: 0.82rem;
    }
    .test-row:last-child { border-bottom: none; }
    .outcome-icon {
      flex-shrink: 0;
      width: 18px;
      text-align: center;
      font-size: 0.85rem;
      margin-top: 0.02rem;
    }
    .test-name { flex: 1; word-break: break-all; color: #d7dadc; }
    .test-name .param { color: #818384; }
    .test-msg {
      width: 100%;
      margin-top: 0.2rem;
      margin-left: 1.6rem;
      font-size: 0.75rem;
      color: #f87171;
      font-family: monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .outcome-passed  .test-name { color: #d7dadc; }
    .outcome-failed  .test-name { color: #f87171; }
    .outcome-xfailed .test-name { color: #d4b14a; }
    .outcome-skipped .test-name { color: #818384; }

    /* ── Raw output ── */
    #raw-wrap { display: none; width: min(780px,100%); margin-top: 1rem; }
    #raw-toggle {
      background: none;
      border: 1px solid #3a3a3c;
      border-radius: 6px;
      color: #818384;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.3rem 0.7rem;
      margin-bottom: 0.5rem;
    }
    #raw-toggle:hover { color: #fff; border-color: #fff; }
    #raw-out {
      display: none;
      background: #0d0d0e;
      border: 1px solid #2a2a2c;
      border-radius: 8px;
      color: #818384;
      font-family: monospace;
      font-size: 0.72rem;
      max-height: 320px;
      overflow-y: auto;
      padding: 0.8rem 1rem;
      white-space: pre;
    }

    /* ── Error box ── */
    #error-box {
      display: none;
      margin-top: 1.5rem;
      background: #2c0a0a;
      border: 1px solid #7f1d1d;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      color: #fca5a5;
      font-size: 0.9rem;
      width: min(600px, 100%);
    }

    /* ── Image test tooltips ── */
    .param-tt-wrap {
      position: relative;
      display: inline-block;
      /* padding-bottom bridges the gap between param text and tooltip so
         moving the cursor into the tooltip doesn't dismiss it            */
      padding-bottom: 4px;
    }
    .param-tt-wrap .param {
      cursor: help;
      border-bottom: 1px dotted #555;
    }
    .img-tooltip {
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.12s ease;
      position: absolute;
      top: 100%;    /* sits right below the padding-bottom edge */
      left: 0;
      z-index: 999;
      background: #1e1e1f;
      border: 1px solid #3a3a3c;
      border-radius: 10px;
      padding: 0.85rem 1rem;
      min-width: 200px;
      max-width: 300px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.65);
      pointer-events: none;
      white-space: normal;
      word-break: normal;
    }
    .param-tt-wrap:hover .img-tooltip {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }

    /* Tooltip internals */
    .tt-filename {
      font-family: monospace;
      font-size: 0.71rem;
      color: #d7dadc;
      margin-bottom: 0.55rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid #2a2a2c;
    }
    .tt-section { margin-top: 0.5rem; }
    .tt-label {
      font-size: 0.61rem;
      color: #818384;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.38rem;
    }
    .tt-empty {
      font-size: 0.71rem;
      color: #818384;
      font-style: italic;
    }

    /* Mini Wordle grid */
    .mini-grid { display: flex; flex-direction: column; gap: 3px; }
    .mini-row  { display: flex; gap: 3px; }
    .mini-tile {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.67rem;
      color: #fff;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .mini-tile.mismatch {
      outline: 2px solid #f87171;
      outline-offset: 1px;
    }

    /* Tooltip status line */
    .tt-match {
      font-size: 0.71rem;
      margin-top: 0.38rem;
    }
    .tt-match.ok  { color: #6aad65; }
    .tt-match.bad { color: #f87171; }
    .tt-match.dim { color: #818384; }
  </style>
</head>
<body>

  <header>
    <h1>Wordle Helper</h1>
    <p class="subtitle">Regression Test Suite</p>
    <div style="display:flex;gap:1.2rem;justify-content:center;margin-top:0.4rem;">
      <a class="back-link" href="index.html">← helper</a>
      <a class="back-link" href="test_image.html">+ add fixture</a>
      <a class="back-link" href="fixtures.html">✎ manage fixtures</a>
    </div>
  </header>

  <!-- Suite selector -->
  <div class="suite-tabs">
    <button class="tab active" data-suite="image">Image Tests</button>
    <button class="tab" data-suite="api">API Tests <span class="warn">~20 min</span></button>
    <button class="tab" data-suite="all">All Tests <span class="warn">~20 min</span></button>
  </div>

  <button id="run-btn">▶ Run Tests</button>

  <div id="status-bar"></div>
  <div id="error-box"></div>

  <!-- Summary badges -->
  <div id="summary"></div>

  <!-- Per-test results -->
  <div id="results-wrap"></div>

  <!-- Raw output -->
  <div id="raw-wrap">
    <button id="raw-toggle">Show raw output</button>
    <pre id="raw-out"></pre>
  </div>

  <script>
    const API_URL = "https://wordle-assistant-production-6f2c.up.railway.app";

    const runBtn      = document.getElementById("run-btn");
    const statusBar   = document.getElementById("status-bar");
    const errorBox    = document.getElementById("error-box");
    const summaryEl   = document.getElementById("summary");
    const resultsWrap = document.getElementById("results-wrap");
    const rawWrap     = document.getElementById("raw-wrap");
    const rawToggle   = document.getElementById("raw-toggle");
    const rawOut      = document.getElementById("raw-out");

    // ── Fixture metadata (fetched once on page load) ───────────────────────────
    let expectedData = {};

    (async () => {
      try {
        const r = await fetch(`${API_URL}/tests/expected`);
        if (r.ok) expectedData = await r.json();
      } catch { /* silently ignore — tooltips just won't show expected grids */ }
    })();

    // ── Suite selection ────────────────────────────────────────────────────────
    let currentSuite = "image";
    document.querySelectorAll(".tab").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        currentSuite = btn.dataset.suite;
      });
    });

    // ── Raw output toggle ──────────────────────────────────────────────────────
    rawToggle.addEventListener("click", () => {
      const shown = rawOut.style.display === "block";
      rawOut.style.display = shown ? "none" : "block";
      rawToggle.textContent = shown ? "Show raw output" : "Hide raw output";
    });

    // ── Timer ──────────────────────────────────────────────────────────────────
    let timerInterval = null;
    let timerSecs = 0;

    function startTimer() {
      timerSecs = 0;
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timerSecs++;
        const m = String(Math.floor(timerSecs / 60)).padStart(2, "0");
        const s = String(timerSecs % 60).padStart(2, "0");
        setStatus(`<span class="spinner-ring"></span> Running… <span id="timer">${m}:${s}</span>`);
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
    }

    function setStatus(html) {
      statusBar.innerHTML = html;
    }

    // ── Run ────────────────────────────────────────────────────────────────────
    runBtn.addEventListener("click", runTests);

    async function runTests() {
      // Reset UI
      runBtn.disabled = true;
      errorBox.style.display   = "none";
      summaryEl.style.display  = "none";
      resultsWrap.style.display = "none";
      rawWrap.style.display    = "none";
      rawOut.style.display     = "none";
      rawToggle.textContent    = "Show raw output";

      startTimer();
      setStatus(`<span class="spinner-ring"></span> Running ${currentSuite} tests…`);

      try {
        // Fetch test results and fixture OCR data in parallel.
        // fixture-ocr runs parse_wordle_image on every fixture (~30 s);
        // tests/run runs pytest (~1 min for image suite).  Both kick off
        // simultaneously so the tooltip data is ready by the time tests finish.
        const [testsResult, ocrResult] = await Promise.allSettled([
          fetch(`${API_URL}/tests/run?suite=${currentSuite}`).then(async (r) => {
            if (!r.ok) {
              const j = await r.json().catch(() => ({ detail: r.statusText }));
              throw new Error(j.detail || `HTTP ${r.status}`);
            }
            return r.json();
          }),
          fetch(`${API_URL}/tests/fixture-ocr`).then((r) => (r.ok ? r.json() : Promise.resolve(null))),
        ]);

        stopTimer();

        if (testsResult.status === "rejected") throw testsResult.reason;

        const data    = testsResult.value;
        const ocrData = (ocrResult.status === "fulfilled" && ocrResult.value) ? ocrResult.value : {};

        renderResults(data, ocrData);
      } catch (err) {
        stopTimer();
        setStatus("");
        errorBox.textContent  = `⚠ ${err.message}`;
        errorBox.style.display = "block";
      } finally {
        runBtn.disabled = false;
      }
    }

    // ── Render ─────────────────────────────────────────────────────────────────
    const ICONS = {
      passed:  "✓",
      failed:  "✗",
      xfailed: "~",
      xpassed: "!",
      skipped: "–",
      error:   "✗",
    };

    function fmtDuration(secs) {
      if (secs >= 60) {
        const m = Math.floor(secs / 60);
        const s = Math.round(secs % 60);
        return `${m}m ${s}s`;
      }
      return `${secs.toFixed(1)}s`;
    }

    function splitName(name) {
      // Split "test_foo[param]" into base + param for styling
      const bracket = name.indexOf("[");
      if (bracket === -1) return { base: name, param: "" };
      return { base: name.slice(0, bracket), param: name.slice(bracket) };
    }

    /** Extract a .png fixture filename from a param like "[raise_could.png]". */
    function extractPngFilename(param) {
      const m = /^\[(.+\.png)\]$/i.exec(param);
      return m ? m[1] : null;
    }

    /** Build a mini Wordle grid HTML string.
     *  If cmpWords / cmpResps are provided, tiles that differ are marked .mismatch.
     */
    function buildMiniGrid(words, responses, cmpWords, cmpResps) {
      const TILE_COLORS = { g: "#538d4e", y: "#b59f3b", b: "#3a3a3c" };
      let html = '<div class="mini-grid">';
      for (let i = 0; i < words.length; i++) {
        html += '<div class="mini-row">';
        const word = words[i] || "";
        const resp = responses[i] || "bbbbb";
        for (let j = 0; j < 5; j++) {
          const letter = (word[j] || "?").toUpperCase();
          const code   = resp[j] || "b";
          const color  = TILE_COLORS[code] || TILE_COLORS.b;
          const letterMismatch = cmpWords && ((cmpWords[i] || "")[j] !== (words[i] || "")[j]);
          const colorMismatch  = cmpResps && ((cmpResps[i] || "")[j] !== (responses[i] || "")[j]);
          const cls = (letterMismatch || colorMismatch) ? ' mismatch' : '';
          html += `<div class="mini-tile${cls}" style="background:${color}">${escHtml(letter)}</div>`;
        }
        html += '</div>';
      }
      html += '</div>';
      return html;
    }

    /** Build the HTML content for an image-test tooltip. */
    function buildTooltipContent(filename, expEntry, ocrEntry) {
      const expWords = expEntry.words      || [];
      const expResps = expEntry.responses  || [];
      const ocrWords = (ocrEntry && !ocrEntry.error) ? (ocrEntry.words      || []) : null;
      const ocrResps = (ocrEntry && !ocrEntry.error) ? (ocrEntry.responses  || []) : null;

      let html = `<div class="tt-filename">${escHtml(filename)}</div>`;

      // ── Expected section ────────────────────────────────────────────────────
      html += '<div class="tt-section">';
      html += '<div class="tt-label">Expected</div>';
      if (expWords.length === 0) {
        html += '<div class="tt-empty">Blank board (0 guesses)</div>';
      } else {
        // Pass ocrWords/Resps so mismatching expected tiles get highlighted
        html += buildMiniGrid(expWords, expResps, ocrWords, ocrResps);
      }
      html += '</div>';

      // ── Identified section ──────────────────────────────────────────────────
      html += '<div class="tt-section">';
      html += '<div class="tt-label">Identified</div>';

      if (ocrEntry == null) {
        // OCR data unavailable (endpoint failed or not yet loaded)
        html += '<div class="tt-empty">Not available</div>';
      } else if (ocrEntry.error) {
        html += `<div class="tt-match bad">⚠ ${escHtml(ocrEntry.error)}</div>`;
      } else {
        // Compare identified with expected
        const wordsMatch = JSON.stringify(ocrWords) === JSON.stringify(expWords);
        const respsMatch = JSON.stringify(ocrResps) === JSON.stringify(expResps);

        if (wordsMatch && respsMatch) {
          html += '<div class="tt-match ok">✓ Matches expected</div>';
        } else {
          // Show identified grid; mismatching tiles get red outline
          html += buildMiniGrid(ocrWords, ocrResps, expWords, expResps);
          html += '<div class="tt-match bad">⚠ Differs from expected</div>';
        }
      }
      html += '</div>';

      return html;
    }

    function renderResults(data, ocrData = {}) {
      // Status line
      const allGood = data.failed === 0 && data.error === 0;
      const icon    = allGood ? "✓" : "✗";
      const color   = allGood ? "#6aad65" : "#f87171";
      setStatus(`<span style="color:${color}">${icon}</span>&nbsp; Finished in ${fmtDuration(data.duration)}`);

      // Summary badges
      summaryEl.innerHTML = "";
      const badges = [
        { key: "passed",  label: "passed",  cls: "badge-passed"  },
        { key: "failed",  label: "failed",  cls: "badge-failed"  },
        { key: "xfailed", label: "xfailed", cls: "badge-xfailed" },
        { key: "skipped", label: "skipped", cls: "badge-skipped" },
      ];
      badges.forEach(({ key, label, cls }) => {
        const n = data[key] || 0;
        if (n === 0 && key === "skipped") return;
        const b = document.createElement("span");
        b.className = `badge ${cls}`;
        b.textContent = `${n} ${label}`;
        summaryEl.appendChild(b);
      });
      const timeB = document.createElement("span");
      timeB.className = "badge badge-time";
      timeB.textContent = fmtDuration(data.duration);
      summaryEl.appendChild(timeB);
      summaryEl.style.display = "flex";

      // Group tests by file
      const byFile = {};
      for (const t of (data.tests || [])) {
        (byFile[t.file] = byFile[t.file] || []).push(t);
      }

      resultsWrap.innerHTML = "";
      for (const [file, tests] of Object.entries(byFile)) {
        const group = document.createElement("div");
        group.className = "file-group";

        const hdr = document.createElement("div");
        hdr.className = "file-header";
        hdr.textContent = file;
        group.appendChild(hdr);

        for (const t of tests) {
          const row = document.createElement("div");
          row.className = `test-row outcome-${t.outcome}`;

          const icon = document.createElement("span");
          icon.className = "outcome-icon";
          icon.textContent = ICONS[t.outcome] || "?";
          row.appendChild(icon);

          const nameWrap = document.createElement("div");
          nameWrap.style.flex = "1";

          const { base, param } = splitName(t.name);
          const nameEl = document.createElement("span");
          nameEl.className = "test-name";

          // If param is a .png fixture name, wrap it in a tooltip
          const imgFile = extractPngFilename(param);
          if (imgFile && expectedData[imgFile]) {
            const ocrEntry   = ocrData[imgFile] ?? null;
            const ttContent  = buildTooltipContent(imgFile, expectedData[imgFile], ocrEntry);
            nameEl.innerHTML =
              escHtml(base) +
              `<span class="param-tt-wrap">` +
                `<span class="param">${escHtml(param)}</span>` +
                `<div class="img-tooltip">${ttContent}</div>` +
              `</span>`;
          } else {
            nameEl.innerHTML = `${escHtml(base)}<span class="param">${escHtml(param)}</span>`;
          }

          nameWrap.appendChild(nameEl);

          if (t.message) {
            const msg = document.createElement("div");
            msg.className = "test-msg";
            msg.textContent = t.message;
            nameWrap.appendChild(msg);
          }
          row.appendChild(nameWrap);
          group.appendChild(row);
        }
        resultsWrap.appendChild(group);
      }
      resultsWrap.style.display = "block";

      // Raw output
      if (data.output_tail) {
        rawOut.textContent = data.output_tail;
        rawWrap.style.display = "block";
      }
    }

    function escHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
  </script>

</body>
</html>
